version: "3.9"

services:

  api:

    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: mnemosyne_api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - mongo
      - postgres
      - redis

    volumes:
      - .:/app

    restart: unless-stopped

    networks:
      - mnemosyne_network

  mongo:

    image: mongo:7

    container_name: mnemosyne_mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    restart: unless-stopped

    networks:
      - mnemosyne_network

  postgres:

    image: pgvector/pgvector:pg16

    container_name: mnemosyne_pgvector

    environment:
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: agent_password
      POSTGRES_DB: vector_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    networks:
      - mnemosyne_network

  redis:

    image: redis:7

    container_name: mnemosyne_redis

    ports:
      - "6379:6379"

    restart: unless-stopped

    networks:
      - mnemosyne_network

volumes:
  mongo_data:
  postgres_data:

networks:
  mnemosyne_network:
    